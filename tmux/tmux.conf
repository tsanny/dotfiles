# Use vi mode
# set-window-option -g mode-keys vi

# Enable mouse support
set -g mouse on
attach -c "#{pane_current_path}"

# Ensure new tmux windows/panes use zsh
set-option -g default-shell /bin/zsh
set-option -g default-command /bin/zsh

# 1. Enable OSC 52 clipboard handling in tmux
set -g set-clipboard on

# 2. (Crucial for tmux 3.3+) Allow programs in the pane to bypass tmux
# and send escape sequences (like OSC 52) directly to the terminal client
set -g allow-passthrough on

set -g status-bg pink

# Copy-mode selection: white text on blue background
set -g mode-style "fg=#ffffff,bg=#4078f2"

# Command/message bar (Ctrl+b :)
set -g message-style "fg=#ffffff,bg=#4078f2"
set -g message-command-style "fg=#ffffff,bg=#4078f2"

set-option -g renumber-windows on

set -g status-right "%Y-%m-%d %H:%M:%S"
set -g status-interval 1

# Start window numbering at 1
set -g base-index 1

# Start pane numbering at 1 (optional, for consistency)
setw -g pane-base-index 1

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
