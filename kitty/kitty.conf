

# ==============================================================================
# THE "IOS 26" AESTHETIC (BLUR & WINDOW)
# ==============================================================================
# High transparency combined with high blur creates the heavy "frosted glass"
# look associated with modern Apple UI concepts.
# Note: 'background_blur' works best on macOS or KDE plasma on Linux.
# background_opacity 0.75
# background_opacity 1
# background_blur 32

# Substantial padding for a clean, modern feel.
window_padding_width 4

# Hide window decorations for a sleek, borderless look.
# On macOS, you will still have the "traffic lights" if you use 'titlebar-only'.
# Use 'yes' to hide everything (including traffic lights on macOS).
hide_window_decorations titlebar-only

# Remember window size
remember_window_size  yes
initial_window_width  1100
initial_window_height 700


# ==============================================================================
# FONT (VS Code Style)
# ==============================================================================
# Using JetBrains Mono NF fits the VS Code "pro" aesthetic perfectly.
font_family      JetBrainsMono Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto

# VS Code default size is usually around 13 or 14.
font_size 13

# VS Code enables ligatures by default.
disable_ligatures never


# ==============================================================================
# TAB BAR (VS Code Minimalist Style)
# ==============================================================================
# VS Code tabs are simple text with no powerline arrows.
tab_bar_edge bottom
tab_bar_style fade
tab_separator "  |  "
active_tab_font_style   bold
inactive_tab_font_style normal


# ==============================================================================
# CURSOR
# ==============================================================================
# Standard VS Code block cursor.
cursor_shape block
cursor_blink_interval 0.5


# Atom One Light color scheme for Kitty

foreground            #383a42
background            #fafafa
cursor                #383a42
cursor_text_color     #ffffff
selection_foreground  #383a42
selection_background  #e5e5e6
url_color             #0184bc

# black
color0   #696c77
color8   #696c77

# red
color1   #e45649
color9   #e45649

# green
color2   #50a14f
color10  #50a14f

# yellow
color3   #c18401
color11  #c18401

# blue
color4   #4078f2
color12  #4078f2

# magenta
color5   #a626a4
color13  #a626a4

# cyan
color6   #0184bc
color14  #0184bc

# white
color7   #a0a1a7
color15  #ffffff


# ==============================================================================
# ADVANCED
# ==============================================================================
# Keep plenty of history
scrollback_lines 10000

# Clickable URLs
url_style straight
